name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck (web + sync server)
        run: |
          pnpm typecheck
          pnpm sync:build

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_WS_URL: ws://localhost:1234

  docker:
    name: Docker build (web + sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # A broken Dockerfile must fail the badge.
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: cofield-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build sync image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sync
          push: false
          tags: cofield-sync:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

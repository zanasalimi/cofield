# Models Cofield's real topology: a Next.js client and a standalone Yjs
# sync server with a durable leveldb store. `docker compose up` runs the
# whole stack from a fresh clone — open two browser tabs and edit live.
services:
  web: # Next.js client (standalone output)
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_WS_URL: ws://localhost:4321
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:4321
    depends_on:
      - sync
    restart: unless-stopped

  sync: # Node ws + Yjs relay, y-leveldb persistence
    build:
      context: .
      dockerfile: Dockerfile.sync
    ports:
      - "4321:4321"
    environment:
      - YPERSISTENCE=/data
    volumes:
      - canvas-data:/data # y-leveldb — boards survive restart
    restart: unless-stopped

volumes:
  canvas-data: {}
